    <!-- JSON-LD: WebSite (helps Google show a sitelinks search box / nav) -->

    {

      "name": "Alexandru Burtea — Portfolio",

      }

    <!-- Preload hero image (AVIF) for fastest LCP — browsers ignore if AVIF unsupported -->
    <link rel="preload" as="image" type="image/avif"
          imagesrcset="/images/living_room_30-800.avif 800w, /images/living_room_30.avif 1600w"
          imagesizes="100vw" />
    <link rel="preload" as="image" type="image/webp"
          imagesrcset="/images/living_room_30-800.webp 800w, /images/living_room_30.webp 1600w"
          imagesizes="100vw" />

    <!-- Fonts are self-hosted in /fonts — see index.css @font-face declarations -->

    <!-- Prevent FOUC for dark mode (set class before React mounts) -->
    <script>
      (function () {
        try {
          var stored = localStorage.getItem('theme');
          var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
          var theme = stored || (prefersDark ? 'dark' : 'light');
          if (theme === 'dark') document.documentElement.classList.add('dark');
        } catch (e) {}
      })();
    </script>
  </head>

  <body>
    <div id="root"></div>

    <!--
      Hidden form shell so Netlify's build-time form parser can detect
      the "contact" form. The React app actually renders & submits a
      form with matching field names. Do NOT remove these inputs.
    -->
    <form name="contact" netlify netlify-honeypot="bot-field" hidden>
      <input type="text"   name="name" />
      <input type="email"  name="email" />
      <input type="text"   name="subject" />
      <textarea            name="message"></textarea>
      <input type="text"   name="bot-field" />
    </form>

    <script type="module" src="/src/main.tsx"></script>
  </body>
